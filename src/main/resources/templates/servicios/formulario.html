<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Servicio</title>
    <meta charset="UTF-8">
</head>
<body>

<h1 th:text="${servicio.id} != null ? 'Editar Servicio' : 'Nuevo Servicio'"></h1>

<form th:action="@{/servicios/guardar}" th:object="${servicio}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required />
    <br><br>

    <label>Precio:</label>
    <input type="number" step="0.01" th:field="*{precio}" required />
    <br><br>

    <label>Categoría:</label>
    <select th:field="*{categoria}" required>
        <option value="">Seleccione una categoría</option>
        <option th:each="cat : ${listaCategorias}"
                th:value="${cat}"
                th:text="${cat.nombre}">
        </option>
    </select>

    <br><br>

    <button type="submit">Guardar</button>
</form>

<br>
<a th:href="@{/servicios}">Volver a la Lista</a>

</body>
</html>
